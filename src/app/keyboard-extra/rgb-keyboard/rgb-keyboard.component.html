<div class="row mb-3"  data-bs-theme="dark">
      <div class="col">
        <div class="p-3 bg-secondary rounded-3 overflow-auto">
          <div
            class="keyboard-display"
            [class.rgb-enabled]="rgbEnabled"
            [style.--rgb-color]="rgbColor"
            [style.--rgb-opacity]="rgbOpacity"
          >
            @for (row of keyboardLayout; track rowIndex; let rowIndex = $index)
            {
            <div class="d-flex gap-1 mb-1 justify-content-center fw-bolder"  data-bs-theme="dark">
              @for (key of row; track colIndex; let colIndex = $index) {
              <button
                class="btn btn-sm key-btn key-text"
                [ngClass]="{
                  'btn-outline-secondary':
                    key.state === 'btn-outline-secondary',
                }"
                [style.flex]="key.width"
              >
                <span>{{ key.label }}</span>
              </button>
              }
            </div>
            }
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-3"  data-bs-theme="dark">
      <div class="col">
        <div class="p-3 bg-secondary rounded-3">
          <div class="row g-2 mb-2">
            <div class="col-auto">
              <div class="form-check">
                <input
                  type="checkbox"
                  [(ngModel)]="rgbEnabled"
                  class="form-check-input"
                  id="rgbEnable"
                />
                <label class="form-check-label fs-5" for="rgbEnable"
                  >Enable RGB</label
                >
              </div>
            </div>
            <div class="col">
              <select
                [(ngModel)]="rgbMode"
                class="form-select form-select-sm"
                [disabled]="!rgbEnabled"
              >
                <option value="static">Static</option>
                <option value="breathing">Breathing</option>
                <option value="wave">Wave</option>
                <option value="rainbow">Rainbow</option>
                <option value="reactive">Reactive</option>
                <option value="custom">Custom</option>
              </select>
            </div>
          </div>

          <div class="row g-2 mb-2">
            <div class="col-12">
              <label class="form-label mb-1 fs-4"
                >Brightness: {{ brightness }}%</label
              >
              <input
                type="range"
                [(ngModel)]="brightness"
                min="0"
                max="100"
                class="form-range"
                [disabled]="!rgbEnabled"
              />
            </div>
          </div>

          @if (!isCustomMode) {
          <div class="row g-2 mb-2">
            <div class="col-12 col-md-4">
              <label class="form-label mb-1 fs-4">Red: {{ rgbRed }}</label>
              <input
                type="range"
                [(ngModel)]="rgbRed"
                min="0"
                max="255"
                class="form-range"
                [disabled]="!rgbEnabled || rgbMode === 'rainbow'"
              />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label mb-1 fs-4">Green: {{ rgbGreen }}</label>
              <input
                type="range"
                [(ngModel)]="rgbGreen"
                min="0"
                max="255"
                class="form-range"
                [disabled]="!rgbEnabled || rgbMode === 'rainbow'"
              />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label mb-1 fs-4">Blue: {{ rgbBlue }}</label>
              <input
                type="range"
                [(ngModel)]="rgbBlue"
                min="0"
                max="255"
                class="form-range"
                [disabled]="!rgbEnabled || rgbMode === 'rainbow'"
              />
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-12">
              <label for="hexInput" class="form-label fs-4">Hex Code:</label>
              <input
                type="text"
                id="hexInput"
                [(ngModel)]="hexCodeInput"
                class="form-control"
                placeholder="Enter Hex Code"
                [disabled]="!rgbEnabled || rgbMode === 'rainbow'"
              />
            </div>
          </div>
          }
          @if (isCustomMode) {
          <div class="mt-4 border-top pt-3" data-bs-theme="dark">
            <div class="col-6 mb-2">
                <label class="form-label mb-1">Name</label>
                <input
                  type="text"
                  [(ngModel)]="customCycleName"
                  class="form-control form-control-sm"
                  placeholder="My Custom Profile"
                  [disabled]="!rgbEnabled"
                />
              </div>
            @for (colorConfig of customColors; track colorConfig.id) {
            <div class="row g-2 mb-2 align-items-center"  data-bs-theme="dark">
              <div class="col-6">
                <label class="form-label mb-1">Color (Hex)</label>
                <input
                  type="text"
                  [(ngModel)]="colorConfig.hexCode"
                  class="form-control form-control-sm"
                  placeholder="#RRGGBB"
                  [disabled]="!rgbEnabled"
                />
              </div>
              <div class="col-4">
                <label class="form-label mb-1">Duration (ms)</label>
                <input
                  type="number"
                  [(ngModel)]="colorConfig.duration"
                  class="form-control form-control-sm"
                  min="100"
                  [disabled]="!rgbEnabled"
                />
              </div>
              <div class="col-2 text-end">
                <button
                  class="btn btn-sm btn-danger mt-3"
                  (click)="removeCustomColor(colorConfig.id)"
                  [disabled]="!rgbEnabled || customColors.length === 1"
                >
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
            }
            <div class="row mt-3">
              <div class="col">
                <button
                  class="btn btn-sm btn-success"
                  (click)="addCustomColor()"
                  [disabled]="!rgbEnabled"
                >
                  <i class="bi bi-plus-circle"></i> Add Color Step
                </button>
              </div>
            </div>
          </div>
          }
          <div class="row mt-4">
            <div class="col">
              <label class="form-label mb-1 fs-4">Current Preview</label>
              <div
                class="color-preview rounded-3"
                [style.background-color]="rgbColor"
                [style.opacity]="rgbEnabled ? rgbOpacity : 0.3"
              ></div>
            </div>
          </div>
          @if (isCustomMode){
          <div class="row mt-4 text-center">
            <div class="col d-flex justify-content-center">
              <button
                class="btn btn-outline-success w-100"
                (click)="generateCustomRgbConfigJson()"
                [disabled]="!rgbEnabled"
              >
                Apply Profile
              </button>
            </div>
          </div>
        }
        </div>
      </div>
    </div>
